name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install "ruff>=0.9.0,<0.10"
      - run: ruff check .
      - run: ruff format --check .

  # Test pyramid: directory-based split (Adrian directive 2026-05-06 --
  # canonical Brian Okken / pytest-docs hybrid). Each test file under
  # tests/unit/ carries `pytestmark = pytest.mark.unit`; each under
  # tests/integration/ carries `pytestmark = pytest.mark.integration`.
  # tests/conftest.py emits a drift warning when a tests/unit/ file imports
  # a heavy module. Two CI jobs so each lane's duration is visible.
  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/unit -v --cov=mempalace --cov-report=term-missing --cov-fail-under=0 --durations=10
        env:
          PYTEST_TESTS_DRIFT_FAIL: "1"

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/integration -v --cov=mempalace --cov-report=term-missing --cov-fail-under=0 --durations=10
