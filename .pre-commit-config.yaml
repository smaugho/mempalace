# Stop on first hook failure — no point running pytest when ruff auto-fixed
# files (we'd have to recommit anyway) or when the linter is angry.
fail_fast: true

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest-unit (fast path — integration tests run in CI)
        entry: python -m pytest tests/ --ignore=tests/benchmarks -x -q --tb=short -m unit
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
